[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "backtester"
version = "0.1.0"
description = "Backtester + paper-trading harness for historical event replay."
requires-python = ">=3.11"
dependencies = []

[project.optional-dependencies]
alpaca = ["alpaca-py>=0.20"]
dev = []

[project.scripts]
backtester = "backtester.cli:main"

[tool.setuptools.packages.find]
where = ["src"]
