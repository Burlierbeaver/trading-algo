[project]
name = "alpaca-broker-adapter"
version = "0.1.0"
description = "Execution / broker adapter for the trading-algo system. Isolates the Alpaca API."
requires-python = ">=3.11"
dependencies = [
  "alpaca-py>=0.30.0",
  "psycopg[binary]>=3.2",
  "pydantic>=2.6",
  "pydantic-settings>=2.2",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.0",
  "pytest-cov>=5.0",
]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
alpaca_broker_adapter = ["schema.sql"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
addopts = "-ra"
