[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "nlp-signal"
version = "0.1.0"
description = "LLM-powered ticker extraction, sentiment, and event classification for the trading algo pipeline."
requires-python = ">=3.11"
dependencies = [
    "anthropic>=0.48",
    "pydantic>=2.8",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
]

[tool.hatch.build.targets.wheel]
packages = ["src/nlp_signal"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
