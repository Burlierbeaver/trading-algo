<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Trading Monitor{% endblock %}</title>
    <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
    <header class="topbar">
        <div class="brand">Trading Monitor</div>
        <div class="clock" id="server-time">—</div>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
    <script src="/static/dashboard.js" defer></script>
</body>
</html>
